<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bit Heroes Clone - MEGA UPDATE 2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- SIDEBAR DE DROPS -->
    <div id="drop-sidebar" class="sidebar closed">
        <button id="toggle-sidebar" onclick="toggleSidebar()">📦 DROPS</button>
        <div id="sidebar-content">
            <h4 style="color:#f1c40f; margin-bottom:10px; text-align:center; border-bottom:1px solid #444; padding-bottom:5px;">CHANCES DE DROP</h4>
            <div id="drop-list" style="font-size: 11px; overflow-y: auto; max-height: 80vh;">Buscando inimigo...</div>
        </div>
    </div>

    <div id="game-container">
        <!-- BARRA SUPERIOR -->
        <div id="top-bar">
            <div class="stat-group">
                <span class="label">LVL:</span>
                <span id="player-level">1</span>
            </div>
            <div class="stat-group">
                <span class="label">OURO:</span>
                <span id="player-gold">0</span>
            </div>
            <div class="stat-group">
                <span class="label">EXP:</span>
                <div class="exp-bar-container">
                    <div id="player-exp-bar" class="exp-bar"></div>
                </div>
            </div>
            <div class="stat-group">
                <span class="label">ZONA:</span>
                <span id="zone-display">1</span>
            </div>
        </div>

        <!-- PAINEL ESQUERDO: STATUS TOTAIS -->
        <div id="left-panel">
            <h3>STATUS DO HERÓI</h3>
            <div id="stats-list">
                <div class="stat-row"><span>⚔️ ATAQUE:</span> <span id="stat-atk" class="val">0</span></div>
                <div class="stat-row"><span>❤️ VIDA MÁX:</span> <span id="stat-hp" class="val">0</span></div>
                <div class="stat-row"><span>🛡️ DEFESA:</span> <span id="stat-def" class="val">0</span></div>
                <div class="stat-row"><span>💥 CRÍTICO:</span> <span id="stat-crit" class="val">0%</span></div>
                <div class="stat-row"><span>💨 ESQUIVA:</span> <span id="stat-evade" class="val">0%</span></div>
                <div class="stat-row"><span>🩸 LIFE STEAL:</span> <span id="stat-lifesteal" class="val">0%</span></div>
                <div class="stat-row"><span>🍀 SORTE:</span> <span id="stat-luck" class="val">2.0x</span></div>
                <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
                <div class="stat-row" style="color:#f1c40f; font-size:16px;"><span>🌟 POWER:</span> <span id="stat-pr" class="val">0</span></div>
            </div>
        </div>

        <!-- CENA DE BATALHA -->
        <div id="battle-scene">
            <div id="enemy-area" class="entity-area">
                <div id="enemy-sprite" class="sprite"></div>
                <div class="hp-bar-container">
                    <div id="enemy-hp-bar-inner" class="hp-bar"></div>
                    <span id="enemy-hp-text">0/0</span>
                </div>
                <span id="enemy-name">...</span>
                <span id="enemy-type" class="badge">ZONA 1</span>
            </div>

            <div id="player-area" class="entity-area">
                <div id="mount-sprite" class="mount-sprite"></div>
                <div id="player-sprite" class="sprite"></div>
                <div class="hp-bar-container">
                    <div id="player-hp-bar-inner" class="hp-bar"></div>
                    <span id="player-hp-text">0/0</span>
                </div>
                <span id="player-name">HERÓI</span>
            </div>
        </div>

        <!-- PAINEL DIREITO: EQUIPAMENTOS E INVENTÁRIO -->
        <div id="right-panel">
            <div class="panel-section">
                <h3>EQUIPAMENTOS & PET</h3>
                <div class="equip-slots">
                    <div class="slot" id="slot-weapon" title="Arma">⚔️</div>
                    <div class="slot" id="slot-armor" title="Armadura">🛡️</div>
                    <div class="slot" id="slot-mount" title="Montaria">🐎</div>
                    <div class="slot" id="slot-pet" title="Pet">🐾</div>
                </div>
            </div>
            
            <div class="panel-section">
                <h3>RELÍQUIAS (MAX 5)</h3>
                <div id="relic-slots" class="equip-slots" style="justify-content: center; gap: 5px;">
                </div>
            </div>

            <div class="panel-section">
                <h3>INVENTÁRIO</h3>
                <div id="inventory-grid" class="grid"></div>
            </div>
            
            <div class="panel-section">
                <h3>LOJA & MASMORRA</h3>
                <div id="shop-container"></div>
            </div>
        </div>

        <!-- LOG DE BATALHA -->
        <div id="battle-log"></div>

        <!-- TOOLTIP -->
        <div id="tooltip" class="tooltip" style="display: none;"></div>
    </div>
    <script src="game.js"></script>
</body>
</html>
