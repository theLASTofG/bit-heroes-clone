<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bit Heroes Clone - AFK Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Barra Superior: Nível, Ouro, EXP -->
        <div id="top-bar">
            <div class="stat-group">
                <span class="label">NÍVEL:</span>
                <span id="player-level">1</span>
            </div>
            <div class="stat-group">
                <span class="label">OURO:</span>
                <span id="player-gold">0</span>
            </div>
            <div class="stat-group">
                <span class="label">EXP:</span>
                <div class="exp-bar-container">
                    <div id="player-exp-bar" class="exp-bar"></div>
                </div>
            </div>
        </div>

        <!-- Cena de Batalha (Lado Esquerdo) -->
        <div id="battle-scene">
            <div id="enemy-area" class="entity-area">
                <div id="enemy-sprite" class="sprite"></div>
                <div class="hp-bar-container">
                    <div id="enemy-hp-bar-inner" class="hp-bar"></div>
                    <span id="enemy-hp-text">150/150</span>
                </div>
                <span id="enemy-name">Slime</span>
                <span id="enemy-type" class="badge">ZONA 1</span>
            </div>

            <div id="player-area" class="entity-area">
                <div id="player-sprite" class="sprite"></div>
                <div class="hp-bar-container">
                    <div id="player-hp-bar-inner" class="hp-bar"></div>
                    <span id="player-hp-text">100/100</span>
                </div>
                <span id="player-name">Herói Pixel</span>
            </div>
        </div>

        <!-- Painel de Inventário (Lado Direito) -->
        <div id="inventory-panel">
            <h3>EQUIPAMENTOS</h3>
            <div class="equip-slots">
                <div class="slot" id="slot-weapon" title="Arma">⚔️</div>
                <div class="slot" id="slot-armor" title="Armadura">🛡️</div>
            </div>
            <h3>INVENTÁRIO</h3>
            <div id="inventory-grid" class="grid">
                <!-- Itens via JS -->
            </div>
        </div>

        <!-- Log de Batalha (Rodapé Esquerdo) -->
        <div id="battle-log">
            <p>⚔️ A aventura ociosa começou!</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
